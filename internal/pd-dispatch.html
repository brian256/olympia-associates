function getWeekdays() {
  const days = [];
  const start = new Date(2026, 5, 1); // June 1 2026
  const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
  const monthNames = ["January", "February", "March", "April", "May", "June",
    "July", "August", "September", "October", "November", "December"];
  for (let i = 0; i < 90; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    const dow = d.getDay();
    if (dow >= 1 && dow <= 5) {
      days.push(`${dayNames[dow]}, ${monthNames[d.getMonth()]} ${d.getDate()}`);
    }
  }
  return days;
}

const WEEKDAYS = getWeekdays();

function Field({ field, value, onChange, S }) {
  if (field.type === "checkbox") return (
    <label style={{ display: "flex", alignItems: "center", gap: "8px", fontSize: "14px", cursor: "pointer" }}>
      <input type="checkbox" checked={!!value} onChange={(e) => onChange(e.target.checked)} />
      Yes
    </label>
  );

  if (field.type === "radio") return (
    <div>{field.options.map((opt) => (
      <label key={opt} style={{ display: "flex", alignItems: "center", gap: "8px", fontSize: "14px", cursor: "pointer", marginBottom: "6px" }}>
        <input type="radio" name={field.key} value={opt} checked={value === opt} onChange={() => onChange(opt)} />
        {opt}
      </label>
    ))}</div>
  );

  if (field.type === "select") return (
    <select style={{ ...S.input, appearance: "auto" }} value={value || ""} onChange={(e) => onChange(e.target.value)}>
      <option value="">— select —</option>
      {field.options.map((opt) => <option key={opt} value={opt}>{opt}</option>)}
    </select>
  );

  if (field.multiline) return (
    <textarea style={S.textarea} placeholder={field.placeholder}
      value={value || ""} onChange={(e) => onChange(e.target.value)} />
  );

  return (
    <input type={field.inputType || "text"} style={S.input}
      placeholder={field.placeholder} value={value || ""}
      onChange={(e) => onChange(e.target.value)} />
  );
}

function FieldRow({ field, values, onChange, S }) {
  if (field.conditionalOn) {
    const { key, value } = field.conditionalOn;
    if (values[key] !== value) return null;
  }
  return (
    <div style={{ marginBottom: "16px" }}>
      <label style={S.label}>
        {field.label}
        {field.required && <span style={{ color: "#c00" }}> *</span>}
        {!field.required && !field.conditionalOn && <span style={{ color: "#ccc" }}> optional</span>}
      </label>
      <Field field={field} value={values[field.key]} onChange={(v) => onChange(field.key, v)} S={S} />
    </div>
  );
}

// ─── Shared send function ───────────────────────────────────────────────────

async function sendEmail({ to, subject, body, replyTo, sigPlainText, sigHtml }) {
  const bodyWithoutSig = body.endsWith(sigPlainText)
    ? body.slice(0, body.lastIndexOf(sigPlainText)).trimEnd()
    : body;

  const htmlBody = bodyWithoutSig
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .split("\n")
    .map((line) => line.trim() === ""
      ? `<div style="height:10px;"></div>`
      : `<p style="margin:0;font-family:Georgia,serif;font-size:15px;line-height:1.65;color:#1a1a1a;">${line}</p>`)
    .join("\n");

  const html = `<!DOCTYPE html><html><head><meta charset="utf-8"></head>
<body style="background:#fff;padding:40px 0;margin:0;">
  <div style="max-width:600px;margin:0 auto;padding:0 28px;">
    <div style="border-top:3px solid #1a1a1a;padding-top:22px;margin-bottom:30px;">
      <span style="font-family:Georgia,serif;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#999;">Olympia &amp; Associates</span>
    </div>
    <div style="padding-bottom:24px;">${htmlBody}</div>
    <div style="border-top:1px solid #e4e4e4;padding-top:16px;margin-top:8px;">
      ${sigHtml}
    </div>
  </div>
</body></html>`;

  const res = await fetch(PROXY_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ to, subject, html, text: body, reply_to: replyTo }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || err.message || `HTTP ${res.status}`);
  }
  return await res.json();
}

      { key: "work_status", label: "Current work status", placeholder: "on hold pending payment", required: true, defaultVal: "on hold pending payment" },
    ],
    subject: (v) => v.reminder_number === "First (3 days overdue)"
      ? `Friendly reminder — Invoice ${v.invoice_reference} was due ${v.original_due_date}`
      : `Second notice — Invoice ${v.invoice_reference} outstanding`,
    body: (v, sig) => {
      if (v.reminder_number === "First (3 days overdue)") {
        return `Hi ${v.client_first_name},

A quick note — Invoice ${v.invoice_reference} (${v.invoice_amount}) was due on ${v.original_due_date} and doesn't appear to have cleared yet.

If there's been a hiccup with payment, no problem — just let me know. The invoice link is here if you need it: ${v.invoice_link}

Work is currently ${v.work_status}.

${sig}`;
      }
      return `Hi ${v.client_first_name},

Invoice ${v.invoice_reference} (${v.invoice_amount}) remains outstanding. It was due on ${v.original_due_date}.

I want to make sure this hasn't slipped through — please action this when you can: ${v.invoice_link}

If there's something I should know about, reply here and we can sort it out.

Work on your engagement is on hold until this is resolved.

${sig}`;
    },
  },

  PD_07: {
    id: "PD_07",
    name: "07 — Progress Check-in",
    trigger: "Client silent 5+ days, draft in review, or materials awaited",
    replyTo: "brian@olympia-associates.ca",
    fields: [
      { key: "client_first_name", label: "Client first name", placeholder: "Amara", required: true },
      { key: "checkin_type", label: "Reason for check-in", type: "radio", options: ["Awaiting client materials", "Awaiting review feedback", "General mid-engagement check-in"], required: true },
      { key: "current_status", label: "Where the engagement sits now", placeholder: "your Master Resume draft is with you for review", required: true },
      { key: "client_action", label: "What the client needs to do", placeholder: "send your feedback so I can turn around the revision", required: true },
      { key: "next_milestone", label: "What happens once they act", placeholder: "I'll return the revised resume within 3 business days", required: true },
      { key: "deadline_flag", label: "Deadline to flag (optional)", placeholder: "the AHS posting closes July 3", required: false },
    ],
    subject: (v) => `Checking in — ${v.current_status}`,
    body: (v, sig) => {
      const deadlineNote = v.deadline_flag ? `\n\nOne thing worth flagging: ${v.deadline_flag}.` : "";
      if (v.checkin_type === "Awaiting client materials") {
        return `Hi ${v.client_first_name},

Just checking in — I'm still waiting on ${v.client_action} before I can start the next phase.

Once I have everything, ${v.next_milestone}.${deadlineNote}

No rush if life has gotten busy — just want to make sure nothing is stuck on my end. Reply here when you're ready.

${sig}`;
      }
      if (v.checkin_type === "Awaiting review feedback") {
        return `Hi ${v.client_first_name},

Following up on ${v.current_status}. I haven't heard back yet — wanted to make sure it landed and nothing is unclear.

When you're ready, ${v.client_action}. Once I have your feedback, ${v.next_milestone}.${v.deadline_flag ? `\n\nOne note: ${v.deadline_flag} — so the sooner we can close this, the better.` : ""}

If you're stuck on any part of the review, reply and I'll walk you through it.

${sig}`;
      }
      return `Hi ${v.client_first_name},

Wanted to touch base — ${v.current_status}.

Next up: ${v.client_action}, and then ${v.next_milestone}.${deadlineNote}

Any questions before we get there? Reply here.

${sig}`;
    },
  },

  PD_08: {
    id: "PD_08",
    name: "08 — Community Invitation",
    trigger: "Send at or within 24h of final delivery",
    replyTo: "brian@olympia-associates.ca",
    fields: [
      { key: "client_first_name", label: "Client first name", placeholder: "Amara", required: true },
      { key: "engagement_summary", label: "One-line summary of what was built", placeholder: "your Master Resume, LinkedIn rebuild, and two tailored applications", required: true },
      { key: "community_link", label: "WhatsApp community invite link", placeholder: "https://chat.whatsapp.com/...", required: true },
    ],
    subject: () => `You're done — and you're not on your own`,
    body: (v, sig) => `Hi ${v.client_first_name},

Your active engagement is complete. ${v.engagement_summary} — that's what we built together, and it's yours to use.

I want to make sure you don't disappear into the job search alone. Olympia & Associates runs a small professional community — a WhatsApp group for people who've come through this process. It's where I share job leads, relevant opportunities, and occasional market intel that doesn't make it into a newsletter. Members also refer each other.

It's not a paid service. There's no upsell. It's just a room worth being in.

If you'd like to join: ${v.community_link}

And if a role comes up that isn't quite right for you but might fit someone you know — send it my way. That's how this works.

Good luck. I'm rooting for you.

${sig}`,
  },

  PD_09: {
    id: "PD_09",
    name: "09 — Final Delivery / Engagement Close",
    trigger: "Send when all contracted deliverables are complete",
    replyTo: "brian@olympia-associates.ca",
    fields: [
      { key: "client_first_name", label: "Client first name", placeholder: "Amara", required: true },
      { key: "package_name", label: "Package", type: "select", options: PACKAGES, required: true },
      { key: "deliverables_list", label: "Deliverables (one per line)", placeholder: "Master Resume — Nakato_MasterResume_2026-06.docx\nFull Resume — Nakato_FullResume_2026-06.docx", required: true, multiline: true },
      { key: "payment_cleared", label: "Final payment already cleared?", type: "radio", options: ["Yes — release files now", "No — hold files pending payment"], required: true },
      { key: "final_invoice_reference", label: "Final invoice ref (if payment outstanding)", placeholder: "INV-2026-009", required: false },
      { key: "final_invoice_link", label: "Final invoice link (if payment outstanding)", placeholder: "https://invoice.wave.com/...", required: false },
      { key: "toolkit_included", label: "Client Toolkit included? (Career Launch Bundle only)", type: "checkbox", required: false },
    ],
    subject: (v) => `Your materials are ready — ${v.package_name} complete`,
    body: (v, sig) => {
      const toolkitLine = v.toolkit_included
        ? "\n- Your Client Toolkit is included. It covers how to tailor a resume, write a cover letter, follow up after applying, and prepare for interviews — using AI or without it."
        : "";
      const std = `\n- The included revision round covered everything we worked through together. Any future changes are available at $75/round — just reach out.\n- If a new role comes up and you need a tailored application built from your Full Resume, that's a separate engagement. Same process, faster — the foundation is already done.${toolkitLine}`;
      if (v.payment_cleared === "Yes — release files now") {
        return `Hi ${v.client_first_name},

Everything is done. Here's what's attached:

${v.deliverables_list}

These are your documents — keep them somewhere you can find them. The Master Resume is a long-lived asset; update it as your career moves, and everything else derives from it.

A few things before I close the file:
${std}

It's been good work. Good luck with what comes next.

${sig}`;
      }
      return `Hi ${v.client_first_name},

Everything is done. Here's what I've built:

${v.deliverables_list}

Your final invoice (${v.final_invoice_reference}) is here: ${v.final_invoice_link}

Once payment clears, I'll release all files immediately. Everything is packaged and ready.

A few things to know before I hand over:
${std}

Looking forward to getting this to you.

${sig}`;
    },
  },
};

// ════════════════════════════════════════════════════════════════════════════
// STREAM REGISTRY — every stream the firm runs, configured or placeholder
// ════════════════════════════════════════════════════════════════════════════

const STREAMS = {
  PD: {
    id: "PD",
    label: "Professional Development",
    pageUrl: "olympia-associates.ca/services/professional-development.html",
    pageLabel: "Professional Development",
    configured: true,
    templates: PD_TEMPLATES,
  },
  HSCC: {
    id: "HSCC",
    label: "High School Career Consulting",
    pageUrl: "olympia-associates.ca/services/high-school-career-consulting.html",
    pageLabel: "High School Career Consulting",
    configured: false,
    templates: {},
  },
  LBC: {
    id: "LBC",
    label: "Leadership & Business Consulting",
    pageUrl: "olympia-associates.ca/services/leadership-business-consulting.html",
    pageLabel: "Leadership & Business Consulting",
    configured: false,
    templates: {},
  },
  NIP: {
    id: "NIP",
    label: "Newcomer & Immigration Pathways",
    pageUrl: "olympia-associates.ca/services/newcomer-immigration-pathways.html",
    pageLabel: "Newcomer & Immigration Pathways",
    configured: false,
    templates: {},
  },
};

// ════════════════════════════════════════════════════════════════════════════
// APP
// ════════════════════════════════════════════════════════════════════════════

const STEP = { STREAM: "stream", SELECT: "select", FILL: "fill", REVIEW: "review", DONE: "done" };

function EmailDispatch() {
  const [step, setStep] = React.useState(STEP.STREAM);
  const [streamId, setStreamId] = React.useState(null);
  const [selectedId, setSelectedId] = React.useState(null);
  const [values, setValues] = React.useState({});
  const [recipientEmail, setRecipientEmail] = React.useState("");
  const [sending, setSending] = React.useState(false);
  const [sendResult, setSendResult] = React.useState(null);
  const [sendError, setSendError] = React.useState(null);

  const stream = streamId ? STREAMS[streamId] : null;
  const tmpl = stream && selectedId ? stream.templates[selectedId] : null;

  const setVal = (key, val) => setValues((p) => ({ ...p, [key]: val }));

  const canProceed = React.useCallback(() => {
    if (!tmpl || !recipientEmail.includes("@")) return false;
    return tmpl.fields.every((f) => {
      if (f.conditionalOn && values[f.conditionalOn.key] !== f.conditionalOn.value) return true;
      if (!f.required && !f.conditionalOn) return true;
      if (f.type === "radio") return !!values[f.key];
      if (f.type === "checkbox") return true;
      return values[f.key] && String(values[f.key]).trim() !== "";
    });
  }, [tmpl, values, recipientEmail]);

  const sigPlainText = tmpl ? buildSignature(tmpl.replyTo, stream.pageUrl) : "";
  const sigHtml = tmpl ? buildSignatureHtml(tmpl.replyTo, stream.pageUrl, stream.pageLabel) : "";

  const subject = tmpl ? tmpl.subject(values) : "";
  const body = tmpl ? tmpl.body(values, sigPlainText) : "";

  const selectStream = (id) => {
    if (!STREAMS[id].configured) return;
    setStreamId(id);
    setStep(STEP.SELECT);
  };

  const selectTemplate = (id) => {
    setSelectedId(id);
    const defs = {};
    stream.templates[id].fields.forEach((f) => { if (f.defaultVal) defs[f.key] = f.defaultVal; });
    setValues(defs);
    setRecipientEmail("");
    setSendError(null);
    setSendResult(null);
    setStep(STEP.FILL);
  };

  const handleSend = async () => {
    setSending(true);
    setSendError(null);
    try {
      const result = await sendEmail({ to: recipientEmail, subject, body, replyTo: tmpl.replyTo, sigPlainText, sigHtml });
      setSendResult(result);
      setStep(STEP.DONE);
    } catch (e) {
      setSendError(e.message);
    } finally {
      setSending(false);
    }
  };

  const resetToStreams = () => {
    setStep(STEP.STREAM);
    setStreamId(null);
    setSelectedId(null);
    setValues({});
    setRecipientEmail("");
    setSendResult(null);
    setSendError(null);
  };

  const resetToTemplates = () => {
    setStep(STEP.SELECT);
    setSelectedId(null);
    setValues({});
    setRecipientEmail("");
    setSendResult(null);
    setSendError(null);
  };

  const Header = ({ sub, backFn, backLabel }) => (
    <div style={S.header}>
      <div>
        <p style={S.headerTitle}>Olympia & Associates</p>
        <p style={S.headerSub}>{sub}</p>
      </div>
      {backFn && <button style={S.btnSecondary} onClick={backFn}>{backLabel}</button>}
    </div>
  );

  // ── STREAM PICKER ───────────────────────────────────────────────────────
  if (step === STEP.STREAM) return (
    <div style={S.wrap}>
      <Header sub="Email Dispatch — select stream" />
      <div style={S.body}>
        <p style={{ ...S.sectionTitle, marginBottom: "18px" }}>Select stream</p>
        <div style={S.streamGrid}>
          {Object.values(STREAMS).map((st) => (
            <button
              key={st.id}
              style={st.configured ? S.streamCard : S.streamCardDisabled}
              onClick={() => selectStream(st.id)}
              onMouseEnter={(e) => { if (st.configured) e.currentTarget.style.borderColor = "#1a1a1a"; }}
              onMouseLeave={(e) => { if (st.configured) e.currentTarget.style.borderColor = "#e4e4e4"; }}
            >
              <p style={S.streamName}>{st.label}</p>
              <p style={S.streamStatus}>
                {st.configured ? `${Object.keys(st.templates).length} templates` : "Not yet configured"}
              </p>
            </button>
          ))}
        </div>
      </div>
    </div>
  );

  // ── TEMPLATE PICKER ──────────────────────────────────────────────────────
  if (step === STEP.SELECT) return (
    <div style={S.wrap}>
      <Header sub={stream.label} backFn={resetToStreams} backLabel="← Streams" />
      <div style={S.body}>
        <p style={{ ...S.sectionTitle, marginBottom: "18px" }}>Select template</p>
        {Object.values(stream.templates).map((t) => (
          <button key={t.id} style={S.tCard}
            onClick={() => selectTemplate(t.id)}
            onMouseEnter={(e) => e.currentTarget.style.borderColor = "#1a1a1a"}
            onMouseLeave={(e) => e.currentTarget.style.borderColor = "#e4e4e4"}>
            <p style={S.tName}>{t.name}</p>
            <p style={S.tTrigger}>{t.trigger}</p>
          </button>
        ))}
      </div>
    </div>
  );

  // ── FILL ──────────────────────────────────────────────────────────────────
  if (step === STEP.FILL) return (
    <div style={S.wrap}>
      <Header sub={`${stream.label} — ${tmpl.name}`} backFn={resetToTemplates} backLabel="← Templates" />
      <div style={S.body}>
        <div style={S.card}>
          <p style={S.sectionTitle}>Recipient</p>
          <label style={S.label}>Client email <span style={{ color: "#c00" }}>*</span></label>
          <input type="email" style={S.input} placeholder="client@email.com"
            value={recipientEmail} onChange={(e) => setRecipientEmail(e.target.value)} />
        </div>
        <div style={S.card}>
          <p style={S.sectionTitle}>Fields</p>
          {tmpl.fields.map((f) => (
            <FieldRow key={f.key} field={f} values={values} onChange={setVal} S={S} />
          ))}
        </div>
        <div style={{ textAlign: "right" }}>
          <button style={{ ...S.btnPrimary, opacity: canProceed() ? 1 : 0.35 }}
            disabled={!canProceed()} onClick={() => setStep(STEP.REVIEW)}>
            Preview →
          </button>
        </div>
      </div>
    </div>
  );

  // ── REVIEW ───────────────────────────────────────────────────────────────
  if (step === STEP.REVIEW) return (
    <div style={S.wrap}>
      <Header sub="Review before sending" />
      <div style={S.body}>
        <div style={S.alert}><strong>Review carefully.</strong> Once sent, this cannot be recalled.</div>
        {sendError && <div style={S.error}><strong>Send failed:</strong> {sendError}</div>}
        <div style={S.card}>
          <p style={S.sectionTitle}>Envelope</p>
          <p style={S.metaLabel}>From</p>
          <p style={S.metaValue}>{FROM_LINE}</p>
          <p style={S.metaLabel}>Reply-To</p>
          <p style={S.metaValue}>{tmpl.replyTo}</p>
          <p style={S.metaLabel}>To</p>
          <p style={S.metaValue}>{recipientEmail}</p>
          <p style={S.metaLabel}>Subject</p>
          <p style={S.metaValue}>{subject}</p>
        </div>
        <div style={S.card}>
          <p style={S.sectionTitle}>Body</p>
          <div style={S.preview}>{body}</div>
        </div>
        <div style={{ display: "flex", justifyContent: "space-between" }}>
          <button style={S.btnSecondary} onClick={() => setStep(STEP.FILL)}>← Edit</button>
          <button style={{ ...S.btnPrimary, minWidth: "120px", opacity: sending ? 0.5 : 1 }}
            disabled={sending} onClick={handleSend}>
            {sending ? "Sending…" : "Send ↑"}
          </button>
        </div>
      </div>
    </div>
  );

  // ── DONE ─────────────────────────────────────────────────────────────────
  if (step === STEP.DONE) return (
    <div style={S.wrap}>
      <Header sub="Email Dispatch" backFn={resetToStreams} backLabel="← Streams" />
      <div style={S.body}>
        <div style={S.success}>
          <strong>Sent.</strong> {tmpl?.name} delivered to {recipientEmail}.
          {sendResult?.id && <span style={{ display: "block", fontSize: "11px", marginTop: "3px" }}>Resend ID: {sendResult.id}</span>}
        </div>
        <div style={S.card}>
          <p style={S.sectionTitle}>Record</p>
          <p style={S.metaLabel}>To</p><p style={S.metaValue}>{recipientEmail}</p>
          <p style={S.metaLabel}>Subject</p><p style={S.metaValue}>{subject}</p>
          <div style={S.preview}>{body}</div>
        </div>
        <button style={S.btnPrimary} onClick={resetToTemplates}>Send another ({stream.label}) →</button>
      </div>
    </div>
  );

  return null;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<EmailDispatch />);

</script>
</body>
</html>
